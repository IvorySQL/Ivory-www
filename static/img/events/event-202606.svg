<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1528"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7D52F4"/>
      <stop offset="100%" stop-color="#2f74ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- PG 30 badge -->
  <circle cx="300" cy="240" r="80" fill="none" stroke="#7D52F4" stroke-width="2" stroke-opacity="0.4"/>
  <circle cx="300" cy="240" r="68" fill="#1a1040" stroke="#7D52F4" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="300" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#c4b5fd" text-anchor="middle">30</text>
  <text x="300" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#7D52F4" text-anchor="middle" letter-spacing="2">YEARS</text>

  <!-- Livestream icon -->
  <rect x="520" y="185" width="160" height="110" rx="16" fill="#0f1f4a" stroke="#2f74ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="600" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="36" fill="#60a5fa" text-anchor="middle">📡</text>
  <text x="600" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#93c5fd" text-anchor="middle">LIVESTREAM</text>

  <!-- Debate icon -->
  <rect x="760" y="175" width="160" height="130" rx="16" fill="#1a0f02" stroke="#ffa94d" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="840" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="36" fill="#fbbf24" text-anchor="middle">🎙</text>
  <text x="840" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fcd34d" text-anchor="middle">DEBATE</text>
  <text x="840" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#92400e" text-anchor="middle">5 EXPERTS</text>

  <!-- Speaker count -->
  <rect x="1000" y="185" width="140" height="110" rx="16" fill="#0a1628" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="1070" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#34d399" text-anchor="middle">5</text>
  <text x="1070" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#6ee7b7" text-anchor="middle">SPEAKERS</text>

  <!-- Connecting lines -->
  <line x1="380" y1="225" x2="510" y2="225" stroke="#7D52F4" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="6 3"/>
  <line x1="680" y1="225" x2="750" y2="225" stroke="#2f74ff" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="6 3"/>
  <line x1="920" y1="225" x2="990" y2="225" stroke="#ffa94d" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="6 3"/>

  <!-- Bottom area -->
  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040810" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="440" width="1200" height="190" fill="url(#btm)"/>
  <text x="600" y="485" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle">PG 三十而立 · 全球时刻</text>
  <text x="600" y="525" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#93c5fd" text-anchor="middle" fill-opacity="0.8">中国 PG 在全球排第几？圆桌激辩全程干货</text>

  <!-- Category chip -->
  <rect x="44" y="520" width="110" height="32" rx="16" fill="#7D52F4" fill-opacity="0.25" stroke="#7D52F4" stroke-width="1" stroke-opacity="0.5"/>
  <text x="99" y="541" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="1">LIVESTREAM</text>

  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
