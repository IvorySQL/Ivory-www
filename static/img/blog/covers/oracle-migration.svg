<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="45%" stop-color="#0a0f1a"/>
      <stop offset="55%" stop-color="#060c28"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left side: Oracle -->
  <rect x="40" y="60" width="440" height="360" rx="16" fill="#1c0808" stroke="#ef4444" stroke-width="2" stroke-opacity="0.6"/>
  <rect x="40" y="60" width="440" height="56" rx="16" fill="#2d0f0f"/>
  <rect x="40" y="100" width="440" height="16" fill="#2d0f0f"/>
  <text x="260" y="97" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="800" fill="#fca5a5" text-anchor="middle" letter-spacing="2">ORACLE DATABASE</text>

  <!-- Oracle features list -->
  <text x="70" y="148" font-family="monospace" font-size="13" fill="#f87171">▸ ROWNUM / ROWID</text>
  <text x="70" y="172" font-family="monospace" font-size="13" fill="#f87171">▸ CONNECT BY hierarchies</text>
  <text x="70" y="196" font-family="monospace" font-size="13" fill="#f87171">▸ SYSDATE / NVL / DECODE</text>
  <text x="70" y="220" font-family="monospace" font-size="13" fill="#f87171">▸ PL/SQL packages</text>
  <text x="70" y="244" font-family="monospace" font-size="13" fill="#f87171">▸ Oracle sequences</text>
  <text x="70" y="268" font-family="monospace" font-size="13" fill="#f87171">▸ %TYPE / %ROWTYPE</text>
  <text x="70" y="292" font-family="monospace" font-size="13" fill="#f87171">▸ OUTER JOIN (+) syntax</text>
  <text x="70" y="316" font-family="monospace" font-size="13" fill="#f87171">▸ Implicit data conversion</text>
  <text x="70" y="340" font-family="monospace" font-size="13" fill="#f87171">▸ VARCHAR2 / NUMBER types</text>
  <text x="70" y="364" font-family="monospace" font-size="13" fill="#f87171">▸ Autonomous transactions</text>
  <text x="70" y="388" font-family="monospace" font-size="13" fill="#ef4444">COST: $$$$ · vendor lock-in</text>

  <!-- Bridge arrow -->
  <rect x="510" y="185" width="180" height="110" rx="12" fill="#1e1040"/>
  <text x="600" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#c4b5fd" text-anchor="middle">IVORYSQL 5.0+</text>
  <text x="600" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">compatibility bridge</text>
  <!-- Arrow left to right -->
  <path d="M 490 225 L 508 225" stroke="#ef4444" stroke-width="2" marker-end="url(#a1)"/>
  <path d="M 692 255 L 715 255" stroke="#4ade80" stroke-width="2" marker-end="url(#a2)"/>
  <text x="600" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#fbaf42" text-anchor="middle">→</text>
  <text x="600" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">zero rewrites</text>
  <defs>
    <marker id="a1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/>
    </marker>
    <marker id="a2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Right side: IvorySQL / PostgreSQL -->
  <rect x="720" y="60" width="440" height="360" rx="16" fill="#0a1628" stroke="#2f74ff" stroke-width="2" stroke-opacity="0.8"/>
  <rect x="720" y="60" width="440" height="56" rx="16" fill="#0f1f4a"/>
  <rect x="720" y="100" width="440" height="16" fill="#0f1f4a"/>
  <text x="940" y="97" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="800" fill="#93c5fd" text-anchor="middle" letter-spacing="2">IVORYSQL 5.0+</text>

  <text x="750" y="148" font-family="monospace" font-size="13" fill="#4ade80">✓ ROWNUM / ROWID</text>
  <text x="750" y="172" font-family="monospace" font-size="13" fill="#4ade80">✓ CONNECT BY hierarchies</text>
  <text x="750" y="196" font-family="monospace" font-size="13" fill="#4ade80">✓ SYSDATE / NVL / DECODE</text>
  <text x="750" y="220" font-family="monospace" font-size="13" fill="#4ade80">✓ PLiSQL packages</text>
  <text x="750" y="244" font-family="monospace" font-size="13" fill="#4ade80">✓ Oracle-style sequences</text>
  <text x="750" y="268" font-family="monospace" font-size="13" fill="#4ade80">✓ %TYPE / %ROWTYPE</text>
  <text x="750" y="292" font-family="monospace" font-size="13" fill="#4ade80">✓ OUTER JOIN (+) syntax</text>
  <text x="750" y="316" font-family="monospace" font-size="13" fill="#4ade80">✓ Implicit type conversion</text>
  <text x="750" y="340" font-family="monospace" font-size="13" fill="#4ade80">✓ VARCHAR2 / NUMBER</text>
  <text x="750" y="364" font-family="monospace" font-size="13" fill="#4ade80">✓ Autonomous transactions</text>
  <text x="750" y="388" font-family="monospace" font-size="13" fill="#60a5fa">COST: Free · open-source</text>

  <!-- Category chip -->
  <rect x="44" y="520" width="110" height="32" rx="16" fill="#2f74ff" fill-opacity="0.25" stroke="#2f74ff" stroke-opacity="0.5" stroke-width="1"/>
  <text x="99" y="541" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#93c5fd" text-anchor="middle" letter-spacing="1">IVORYSQL</text>

  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040810" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="440" width="1200" height="190" fill="url(#btm)"/>
  <text x="600" y="490" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">Oracle → PostgreSQL Migration</text>
  <text x="600" y="532" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#93c5fd" text-anchor="middle" fill-opacity="0.8">IvorySQL 5.0+ — a game changer for Oracle transitions</text>
  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
