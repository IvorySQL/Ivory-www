<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="50%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#060c28"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Divider line in middle -->
  <line x1="580" y1="60" x2="580" y2="470" stroke="#374151" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- Left: Oracle side -->
  <text x="290" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="3" fill-opacity="0.7">ORACLE DATABASE</text>

  <!-- Oracle package block -->
  <rect x="80" y="120" width="460" height="310" rx="14" fill="#1c0808" stroke="#ef4444" stroke-width="2" stroke-opacity="0.6"/>
  <rect x="80" y="120" width="460" height="44" rx="14" fill="#2d0f0f"/>
  <rect x="80" y="150" width="460" height="14" fill="#2d0f0f"/>
  <text x="310" y="147" font-family="monospace" font-size="13" fill="#f87171" text-anchor="middle">Oracle PL/SQL Package</text>

  <text x="100" y="186" font-family="monospace" font-size="13" fill="#fca5a5">CREATE OR REPLACE PACKAGE</text>
  <text x="100" y="205" font-family="monospace" font-size="13" fill="#f87171">  emp_pkg</text>
  <text x="100" y="224" font-family="monospace" font-size="13" fill="#fca5a5">IS</text>
  <text x="100" y="243" font-family="monospace" font-size="13" fill="#6b7280">  PROCEDURE hire_emp(</text>
  <text x="100" y="262" font-family="monospace" font-size="13" fill="#6b7280">    p_name  VARCHAR2,</text>
  <text x="100" y="281" font-family="monospace" font-size="13" fill="#6b7280">    p_sal   NUMBER);</text>
  <text x="100" y="300" font-family="monospace" font-size="13" fill="#6b7280">  FUNCTION get_sal(</text>
  <text x="100" y="319" font-family="monospace" font-size="13" fill="#6b7280">    p_id  NUMBER)</text>
  <text x="100" y="338" font-family="monospace" font-size="13" fill="#6b7280">    RETURN NUMBER;</text>
  <text x="100" y="357" font-family="monospace" font-size="13" fill="#fca5a5">END emp_pkg;</text>
  <text x="100" y="376" font-family="monospace" font-size="13" fill="#fca5a5">/</text>
  <rect x="100" y="390" width="100" height="24" rx="12" fill="#ef4444" fill-opacity="0.2"/>
  <text x="150" y="407" font-family="monospace" font-size="11" fill="#f87171" text-anchor="middle">Oracle syntax</text>

  <!-- Center: compatibility arrow -->
  <rect x="520" y="215" width="120" height="50" rx="10" fill="#1e3a8a"/>
  <text x="580" y="237" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#93c5fd" text-anchor="middle">100%</text>
  <text x="580" y="254" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#60a5fa" text-anchor="middle">COMPAT</text>
  <polygon points="512,240 520,232 520,248" fill="#60a5fa"/>
  <polygon points="648,240 640,232 640,248" fill="#60a5fa"/>

  <!-- Right: IvorySQL side -->
  <text x="880" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#2f74ff" text-anchor="middle" letter-spacing="3" fill-opacity="0.7">IVORYSQL</text>

  <rect x="620" y="120" width="500" height="310" rx="14" fill="#0a1628" stroke="#2f74ff" stroke-width="2" stroke-opacity="0.6"/>
  <rect x="620" y="120" width="500" height="44" rx="14" fill="#0f1f4a"/>
  <rect x="620" y="150" width="500" height="14" fill="#0f1f4a"/>
  <text x="870" y="147" font-family="monospace" font-size="13" fill="#93c5fd" text-anchor="middle">IvorySQL PL/iSQL Package</text>

  <text x="640" y="186" font-family="monospace" font-size="13" fill="#93c5fd">CREATE OR REPLACE PACKAGE</text>
  <text x="640" y="205" font-family="monospace" font-size="13" fill="#60a5fa">  emp_pkg</text>
  <text x="640" y="224" font-family="monospace" font-size="13" fill="#93c5fd">IS</text>
  <text x="640" y="243" font-family="monospace" font-size="13" fill="#e2e8f0">  PROCEDURE hire_emp(</text>
  <text x="640" y="262" font-family="monospace" font-size="13" fill="#e2e8f0">    p_name  VARCHAR2,</text>
  <text x="640" y="281" font-family="monospace" font-size="13" fill="#e2e8f0">    p_sal   NUMBER);</text>
  <text x="640" y="300" font-family="monospace" font-size="13" fill="#e2e8f0">  FUNCTION get_sal(</text>
  <text x="640" y="319" font-family="monospace" font-size="13" fill="#e2e8f0">    p_id  NUMBER)</text>
  <text x="640" y="338" font-family="monospace" font-size="13" fill="#e2e8f0">    RETURN NUMBER;</text>
  <text x="640" y="357" font-family="monospace" font-size="13" fill="#93c5fd">END emp_pkg;</text>
  <text x="640" y="376" font-family="monospace" font-size="13" fill="#4ade80">-- ✓ same syntax, zero changes</text>
  <rect x="640" y="390" width="120" height="24" rx="12" fill="#2f74ff" fill-opacity="0.3"/>
  <text x="700" y="407" font-family="monospace" font-size="11" fill="#93c5fd" text-anchor="middle">IvorySQL compat</text>
  <rect x="770" y="390" width="80" height="24" rx="12" fill="#16a34a" fill-opacity="0.3"/>
  <text x="810" y="407" font-family="monospace" font-size="11" fill="#4ade80" text-anchor="middle">✓ verified</text>

  <!-- Category chip -->
  <rect x="44" y="44" width="110" height="32" rx="16" fill="#2f74ff" fill-opacity="0.25" stroke="#2f74ff" stroke-opacity="0.5" stroke-width="1"/>
  <text x="99" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#93c5fd" text-anchor="middle" letter-spacing="1">IVORYSQL</text>

  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060c28" stop-opacity="0"/>
      <stop offset="100%" stop-color="#030610" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="450" width="1200" height="180" fill="url(#btm)"/>
  <text x="600" y="508" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">Oracle Package Compatibility</text>
  <text x="600" y="550" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#93c5fd" text-anchor="middle" fill-opacity="0.8">Design insights into IvorySQL 4.0 PL/iSQL packages</text>
  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
