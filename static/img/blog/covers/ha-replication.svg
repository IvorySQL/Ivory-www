  <rect x="0" y="450" width="1200" height="180" fill="url(#btm)"/>

  <text x="600" y="516" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">High Availability — Zero Loss</text>
  <text x="600" y="556" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#93c5fd" text-anchor="middle" fill-opacity="0.8">Logical Replication Slot Synchronization</text>
  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
