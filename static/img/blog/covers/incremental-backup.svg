<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1208"/>
      <stop offset="100%" stop-color="#1a1005"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#d97706"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="220" r="300" fill="#d97706" fill-opacity="0.04"/>

  <!-- Timeline axis -->
  <line x1="80" y1="320" x2="1120" y2="320" stroke="#374151" stroke-width="2"/>

  <!-- FULL backup block -->
  <rect x="80" y="170" width="200" height="150" rx="12" fill="#1c1005" stroke="#d97706" stroke-width="2.5"/>
  <text x="180" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="1">FULL</text>
  <!-- Data blocks inside -->
  <rect x="100" y="220" width="160" height="14" rx="3" fill="#d97706" fill-opacity="0.7"/>
  <rect x="100" y="240" width="160" height="14" rx="3" fill="#d97706" fill-opacity="0.7"/>
  <rect x="100" y="260" width="160" height="14" rx="3" fill="#d97706" fill-opacity="0.7"/>
  <rect x="100" y="280" width="100" height="14" rx="3" fill="#d97706" fill-opacity="0.7"/>
  <text x="180" y="312" font-family="monospace" font-size="11" fill="#d97706" text-anchor="middle">100% data</text>
  <!-- Timeline dot -->
  <circle cx="180" cy="320" r="10" fill="#d97706" stroke="#1c1005" stroke-width="2"/>
  <text x="180" y="350" font-family="monospace" font-size="11" fill="#9ca3af" text-anchor="middle">Day 0</text>
  <text x="180" y="368" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle">2.4 GB</text>

  <!-- Arrow to INCR 1 -->
  <line x1="280" y1="245" x2="380" y2="245" stroke="#d97706" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="6,3"/>

  <!-- INCR backup 1 -->
  <rect x="380" y="210" width="160" height="110" rx="12" fill="#1c1005" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="1">INCR #1</text>
  <rect x="400" y="256" width="120" height="12" rx="3" fill="#f59e0b" fill-opacity="0.6"/>
  <rect x="400" y="274" width="80" height="12" rx="3" fill="#f59e0b" fill-opacity="0.4"/>
  <text x="460" y="306" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle">changed only</text>
  <circle cx="460" cy="320" r="8" fill="#f59e0b" stroke="#1c1005" stroke-width="2"/>
  <text x="460" y="350" font-family="monospace" font-size="11" fill="#9ca3af" text-anchor="middle">Day 1</text>
  <text x="460" y="368" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle">180 MB</text>

  <!-- Arrow to INCR 2 -->
  <line x1="540" y1="265" x2="620" y2="265" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="6,3"/>

  <!-- INCR backup 2 -->
  <rect x="620" y="230" width="160" height="90" rx="12" fill="#1c1005" stroke="#fb923c" stroke-width="1.5"/>
  <text x="700" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fed7aa" text-anchor="middle" letter-spacing="1">INCR #2</text>
  <rect x="640" y="276" width="100" height="10" rx="3" fill="#fb923c" fill-opacity="0.5"/>
  <rect x="640" y="290" width="60" height="10" rx="3" fill="#fb923c" fill-opacity="0.35"/>
  <circle cx="700" cy="320" r="8" fill="#fb923c" stroke="#1c1005" stroke-width="2"/>
  <text x="700" y="350" font-family="monospace" font-size="11" fill="#9ca3af" text-anchor="middle">Day 2</text>
  <text x="700" y="368" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle">94 MB</text>

  <!-- Arrow to INCR 3 -->
  <line x1="780" y1="275" x2="860" y2="275" stroke="#fb923c" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="6,3"/>

  <!-- INCR backup 3 -->
  <rect x="860" y="248" width="160" height="72" rx="12" fill="#1c1005" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="940" y="283" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fed7aa" text-anchor="middle">INCR #3</text>
  <rect x="880" y="292" width="80" height="10" rx="3" fill="#fb923c" fill-opacity="0.35"/>
  <circle cx="940" cy="320" r="8" fill="#fb923c" fill-opacity="0.6" stroke="#1c1005" stroke-width="2"/>
  <text x="940" y="350" font-family="monospace" font-size="11" fill="#9ca3af" text-anchor="middle">Day 3</text>
  <text x="940" y="368" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle">52 MB</text>

  <!-- MERGE result -->
  <rect x="1060" y="160" width="100" height="170" rx="12" fill="#052e16" stroke="#16a34a" stroke-width="2.5"/>
  <text x="1110" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#4ade80" text-anchor="middle">MERGE</text>
  <rect x="1075" y="206" width="70" height="12" rx="3" fill="#16a34a" fill-opacity="0.6"/>
  <rect x="1075" y="224" width="70" height="12" rx="3" fill="#16a34a" fill-opacity="0.6"/>
  <rect x="1075" y="242" width="70" height="12" rx="3" fill="#16a34a" fill-opacity="0.6"/>
  <rect x="1075" y="260" width="70" height="12" rx="3" fill="#16a34a" fill-opacity="0.6"/>
  <rect x="1075" y="278" width="70" height="12" rx="3" fill="#16a34a" fill-opacity="0.6"/>
  <text x="1110" y="316" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="middle">new full</text>
  <circle cx="1110" cy="320" r="10" fill="#16a34a" stroke="#052e16" stroke-width="2"/>
  <line x1="940" y1="320" x2="1100" y2="320" stroke="#16a34a" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="4,3"/>

  <!-- Space saving stat -->
  <rect x="280" y="390" width="640" height="60" rx="12" fill="#1c1005" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="600" y="415" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">Storage: 2.4GB full  +  326MB incremental  =  2.72GB total</text>
  <text x="600" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#4ade80" text-anchor="middle">vs.  4 × full backups = 9.6GB  —  saved 72%  ★</text>

  <!-- Category chip -->
  <rect x="44" y="44" width="110" height="32" rx="16" fill="#d97706" fill-opacity="0.25" stroke="#d97706" stroke-opacity="0.5" stroke-width="1"/>
  <text x="99" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle" letter-spacing="1">IVORYSQL</text>

  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1005" stop-opacity="0"/>
      <stop offset="100%" stop-color="#090702" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="460" width="1200" height="170" fill="url(#btm)"/>
  <text x="600" y="516" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle">Incremental Backup &amp; Merge</text>
  <text x="600" y="558" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#fbbf24" text-anchor="middle" fill-opacity="0.8">Block-level incremental backups with merge capabilities</text>
  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
