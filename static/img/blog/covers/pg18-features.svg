<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001233"/>
      <stop offset="100%" stop-color="#023e8a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="220" r="350" fill="#0077b6" fill-opacity="0.07"/>

  <!-- PG18 large badge -->
  <rect x="440" y="50" width="320" height="100" rx="20" fill="#03045e" stroke="#0077b6" stroke-width="2.5"/>
  <text x="480" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#90e0ef" letter-spacing="2">PostgreSQL</text>
  <text x="700" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="900" fill="#00b4d8" text-anchor="middle">18</text>
  <text x="600" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="900" fill="#00b4d8" text-anchor="middle">18</text>

  <!-- Feature cards: 6 key features in 2x3 grid -->
  <!-- UUIDv7 -->
  <rect x="60" y="180" width="320" height="100" rx="12" fill="#03045e" stroke="#0096c7" stroke-width="1.5"/>
  <rect x="60" y="180" width="6" height="100" rx="3" fill="#00b4d8"/>
  <text x="84" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#90e0ef">UUIDv7 Native</text>
  <text x="84" y="232" font-family="monospace" font-size="12" fill="#6b7280">gen_random_uuid(7)</text>
  <text x="84" y="252" font-family="monospace" font-size="12" fill="#6b7280">time-sortable identifiers</text>
  <text x="84" y="272" font-family="monospace" font-size="11" fill="#4ade80">✓ monotonic ordering</text>

  <!-- Async I/O -->
  <rect x="440" y="180" width="320" height="100" rx="12" fill="#03045e" stroke="#0096c7" stroke-width="1.5"/>
  <rect x="440" y="180" width="6" height="100" rx="3" fill="#48cae4"/>
  <text x="464" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#90e0ef">Async I/O (AIO)</text>
  <text x="464" y="232" font-family="monospace" font-size="12" fill="#6b7280">worker_pool: io_uring</text>
  <text x="464" y="252" font-family="monospace" font-size="12" fill="#6b7280">non-blocking reads</text>
  <text x="464" y="272" font-family="monospace" font-size="11" fill="#4ade80">✓ 30-50% I/O speedup</text>

  <!-- OAuth 2.0 -->
  <rect x="820" y="180" width="320" height="100" rx="12" fill="#03045e" stroke="#0096c7" stroke-width="1.5"/>
  <rect x="820" y="180" width="6" height="100" rx="3" fill="#00b4d8"/>
  <text x="844" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#90e0ef">OAuth 2.0 Auth</text>
  <text x="844" y="232" font-family="monospace" font-size="12" fill="#6b7280">OAUTHBEARER SASL</text>
  <text x="844" y="252" font-family="monospace" font-size="12" fill="#6b7280">token-based access</text>
  <text x="844" y="272" font-family="monospace" font-size="11" fill="#4ade80">✓ cloud identity</text>

  <!-- Virtual Generated Columns -->
  <rect x="60" y="300" width="320" height="100" rx="12" fill="#03045e" stroke="#0077b6" stroke-width="1.5"/>
  <rect x="60" y="300" width="6" height="100" rx="3" fill="#0096c7"/>
  <text x="84" y="327" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#90e0ef">Virtual Gen Columns</text>
  <text x="84" y="348" font-family="monospace" font-size="12" fill="#6b7280">GENERATED ALWAYS AS</text>
  <text x="84" y="368" font-family="monospace" font-size="12" fill="#6b7280">stored on-demand</text>
  <text x="84" y="390" font-family="monospace" font-size="11" fill="#4ade80">✓ no trigger needed</text>

  <!-- MERGE improvements -->
  <rect x="440" y="300" width="320" height="100" rx="12" fill="#03045e" stroke="#0077b6" stroke-width="1.5"/>
  <rect x="440" y="300" width="6" height="100" rx="3" fill="#023e8a"/>
  <text x="464" y="327" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#90e0ef">MERGE Enhancements</text>
  <text x="464" y="348" font-family="monospace" font-size="12" fill="#6b7280">RETURNING clause</text>
  <text x="464" y="368" font-family="monospace" font-size="12" fill="#6b7280">MERGE with views</text>
  <text x="464" y="390" font-family="monospace" font-size="11" fill="#4ade80">✓ SQL:2023 conformant</text>

  <!-- EXPLAIN improvements -->
  <rect x="820" y="300" width="320" height="100" rx="12" fill="#03045e" stroke="#0077b6" stroke-width="1.5"/>
  <rect x="820" y="300" width="6" height="100" rx="3" fill="#0077b6"/>
  <text x="844" y="327" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#90e0ef">EXPLAIN Buffers</text>
  <text x="844" y="348" font-family="monospace" font-size="12" fill="#6b7280">per-node I/O timing</text>
  <text x="844" y="368" font-family="monospace" font-size="12" fill="#6b7280">WAL write stats</text>
  <text x="844" y="390" font-family="monospace" font-size="11" fill="#4ade80">✓ fine-grained tuning</text>

  <!-- Category chip -->
  <rect x="44" y="44" width="130" height="32" rx="16" fill="#0891b2" fill-opacity="0.25" stroke="#0891b2" stroke-opacity="0.5" stroke-width="1"/>
  <text x="109" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#67e8f9" text-anchor="middle" letter-spacing="1">POSTGRESQL</text>

  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#023e8a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#001233" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="430" width="1200" height="200" fill="url(#btm)"/>
  <text x="600" y="490" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle">PostgreSQL 18 Key New Features</text>
  <text x="600" y="532" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#90e0ef" text-anchor="middle" fill-opacity="0.8">In-depth analysis: UUIDv7 · Async I/O · OAuth 2.0 · MERGE</text>
  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
