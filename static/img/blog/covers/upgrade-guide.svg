<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f0a"/>
      <stop offset="100%" stop-color="#1a0f00"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Background glow -->
  <circle cx="600" cy="240" r="300" fill="#f59e0b" fill-opacity="0.04"/>

  <!-- Migration path track -->
  <rect x="100" y="220" width="1000" height="8" rx="4" fill="#1f2937"/>
  <rect x="100" y="220" width="750" height="8" rx="4" fill="url(#track)"/>

  <!-- Version node: 3.0 -->
  <circle cx="150" cy="224" r="36" fill="#1f2937" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="150" y="219" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fbbf24" text-anchor="middle">v</text>
  <text x="150" y="237" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="800" fill="#f59e0b" text-anchor="middle">3.0</text>
  <text x="150" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">base</text>

  <!-- Version node: 3.1 -->
  <circle cx="350" cy="224" r="30" fill="#1f2937" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="229" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="800" fill="#fbbf24" text-anchor="middle">3.1</text>
  <text x="350" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">patch</text>

  <!-- Version node: 3.4 -->
  <circle cx="540" cy="224" r="30" fill="#1f2937" stroke="#fb923c" stroke-width="2"/>
  <text x="540" y="229" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="800" fill="#fb923c" text-anchor="middle">3.4</text>
  <text x="540" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">latest 3.x</text>

  <!-- Arrow + "UPGRADE" label -->
  <path d="M 630 224 L 730 224" stroke="#fb923c" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="726,216 742,224 726,232" fill="#fb923c"/>
  <rect x="640" y="190" width="110" height="26" rx="13" fill="#78350f"/>
  <text x="695" y="208" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fde68a" text-anchor="middle" letter-spacing="1">UPGRADE</text>

  <!-- Version node: 4.0 — BIG, highlighted -->
  <circle cx="860" cy="224" r="60" fill="#1c1408" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="860" cy="224" r="52" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="860" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="2">VERSION</text>
  <text x="860" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="900" fill="#f59e0b" text-anchor="middle">4.0</text>
  <text x="860" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">★ NEW</text>

  <!-- Step cards below -->
  <rect x="60"  y="340" width="240" height="130" rx="10" fill="#1c1408" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="180" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">① Pre-check</text>
  <text x="100" y="390" font-family="monospace" font-size="11" fill="#d97706">pg_upgrade --check</text>
  <text x="100" y="410" font-family="monospace" font-size="11" fill="#9ca3af">validate extensions</text>
  <text x="100" y="430" font-family="monospace" font-size="11" fill="#9ca3af">backup existing DB</text>
  <text x="100" y="450" font-family="monospace" font-size="11" fill="#9ca3af">stop services</text>

  <rect x="330" y="340" width="240" height="130" rx="10" fill="#1c1408" stroke="#fb923c" stroke-width="1.5"/>
  <text x="450" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fb923c" text-anchor="middle">② Migrate</text>
  <text x="350" y="390" font-family="monospace" font-size="11" fill="#d97706">pg_upgrade -b old_bin</text>
  <text x="350" y="410" font-family="monospace" font-size="11" fill="#9ca3af">-d old_data -D new_data</text>
  <text x="350" y="430" font-family="monospace" font-size="11" fill="#9ca3af">link mode: hardlinks</text>
  <text x="350" y="450" font-family="monospace" font-size="11" fill="#9ca3af">convert catalog</text>

  <rect x="600" y="340" width="240" height="130" rx="10" fill="#1c1408" stroke="#4ade80" stroke-width="1.5"/>
  <text x="720" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4ade80" text-anchor="middle">③ Validate</text>
  <text x="620" y="390" font-family="monospace" font-size="11" fill="#d97706">analyze --freeze</text>
  <text x="620" y="410" font-family="monospace" font-size="11" fill="#9ca3af">update statistics</text>
  <text x="620" y="430" font-family="monospace" font-size="11" fill="#9ca3af">verify oracle compat</text>
  <text x="620" y="450" font-family="monospace" font-size="11" fill="#4ade80">✓ start new cluster</text>

  <rect x="870" y="340" width="270" height="130" rx="10" fill="#052e16" stroke="#16a34a" stroke-width="2"/>
  <text x="1005" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4ade80" text-anchor="middle">④ Complete</text>
  <text x="890" y="390" font-family="monospace" font-size="12" fill="#4ade80">✓ 4.0 RUNNING</text>
  <text x="890" y="412" font-family="monospace" font-size="11" fill="#9ca3af">Oracle PKG support</text>
  <text x="890" y="432" font-family="monospace" font-size="11" fill="#9ca3af">PL/iSQL enhanced</text>
  <text x="890" y="452" font-family="monospace" font-size="11" fill="#9ca3af">Invisible columns</text>

  <!-- Category chip -->
  <rect x="44" y="44" width="110" height="32" rx="16" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="1"/>
  <text x="99" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle" letter-spacing="1">IVORYSQL</text>

  <!-- Bottom -->
  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f00" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0800" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="470" width="1200" height="160" fill="url(#btm)"/>
  <text x="600" y="522" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle">Upgrade Guide: 3.x → 4.0</text>
  <text x="600" y="562" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#fbbf24" text-anchor="middle" fill-opacity="0.8">A smooth, zero-downtime migration path</text>
  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
