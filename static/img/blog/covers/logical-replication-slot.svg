<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06141a"/>
      <stop offset="100%" stop-color="#0a1e28"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0891b2"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4ade80"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="250" r="320" fill="#0891b2" fill-opacity="0.04"/>

  <!-- WAL Source (Primary) -->
  <rect x="60" y="100" width="200" height="280" rx="14" fill="#061e26" stroke="#0891b2" stroke-width="2"/>
  <text x="160" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#67e8f9" text-anchor="middle">PRIMARY</text>
  <!-- WAL blocks -->
  <text x="80" y="160" font-family="monospace" font-size="11" fill="#6b7280">WAL log:</text>
  <rect x="80" y="168" width="160" height="16" rx="3" fill="#164e63" fill-opacity="0.8"/>
  <text x="160" y="181" font-family="monospace" font-size="10" fill="#67e8f9" text-anchor="middle">LSN 0/15000090</text>
  <rect x="80" y="190" width="160" height="16" rx="3" fill="#155e75" fill-opacity="0.6"/>
  <text x="160" y="203" font-family="monospace" font-size="10" fill="#67e8f9" text-anchor="middle">LSN 0/158F1A0</text>
  <rect x="80" y="212" width="160" height="16" rx="3" fill="#0e7490" fill-opacity="0.5"/>
  <text x="160" y="225" font-family="monospace" font-size="10" fill="#67e8f9" text-anchor="middle">LSN 0/16A2B40</text>
  <rect x="80" y="234" width="160" height="16" rx="3" fill="#0891b2" fill-opacity="0.4"/>
  <text x="160" y="247" font-family="monospace" font-size="10" fill="#a5f3fc" text-anchor="middle">LSN 0/17CC0F0 ← HEAD</text>
  <text x="80" y="275" font-family="monospace" font-size="11" fill="#6b7280">wal_level:</text>
  <text x="80" y="292" font-family="monospace" font-size="12" fill="#0891b2">  logical</text>
  <text x="80" y="318" font-family="monospace" font-size="11" fill="#6b7280">max_wal_senders:</text>
  <text x="80" y="335" font-family="monospace" font-size="12" fill="#0891b2">  10</text>
  <text x="80" y="361" font-family="monospace" font-size="11" fill="#4ade80">● streaming</text>

  <!-- Logical Replication Slot box (center) -->
  <rect x="320" y="80" width="560" height="360" rx="16" fill="#061a26" stroke="#0891b2" stroke-width="2.5"/>
  <rect x="320" y="80" width="560" height="52" rx="16" fill="#0c4a6e"/>
  <rect x="320" y="116" width="560" height="16" fill="#0c4a6e"/>
  <text x="600" y="115" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="800" fill="#bae6fd" text-anchor="middle" letter-spacing="2">LOGICAL REPLICATION SLOT</text>

  <!-- Slot details -->
  <text x="350" y="156" font-family="monospace" font-size="13" fill="#67e8f9">slot_name: <tspan fill="#a5f3fc">logical_slot_v4</tspan></text>
  <text x="350" y="180" font-family="monospace" font-size="13" fill="#67e8f9">plugin:    <tspan fill="#a5f3fc">pgoutput</tspan></text>
  <text x="350" y="204" font-family="monospace" font-size="13" fill="#67e8f9">database:  <tspan fill="#a5f3fc">myapp</tspan></text>
  <text x="350" y="228" font-family="monospace" font-size="13" fill="#67e8f9">confirmed_flush_lsn:</text>
  <text x="350" y="248" font-family="monospace" font-size="13" fill="#a5f3fc">  0/158F1A0</text>
  <text x="350" y="272" font-family="monospace" font-size="13" fill="#67e8f9">restart_lsn:</text>
  <text x="350" y="292" font-family="monospace" font-size="13" fill="#a5f3fc">  0/15000090</text>

  <!-- Decoded messages flow -->
  <line x1="340" y1="330" x2="840" y2="330" stroke="#0c4a6e" stroke-width="1"/>
  <text x="350" y="322" font-family="monospace" font-size="11" fill="#6b7280">decoded change stream →</text>
  <rect x="350" y="335" width="460" height="24" rx="4" fill="#0c4a6e" fill-opacity="0.8"/>
  <text x="580" y="352" font-family="monospace" font-size="11" fill="#67e8f9" text-anchor="middle">INSERT: {id:1001, name:'Alice', dept:'Eng'}</text>
  <rect x="350" y="363" width="460" height="24" rx="4" fill="#0c4a6e" fill-opacity="0.5"/>
  <text x="580" y="380" font-family="monospace" font-size="11" fill="#67e8f9" text-anchor="middle">UPDATE: {id:1002} SET salary=95000</text>
  <rect x="350" y="391" width="460" height="24" rx="4" fill="#0c4a6e" fill-opacity="0.3"/>
  <text x="580" y="408" font-family="monospace" font-size="11" fill="#67e8f9" text-anchor="middle">DELETE: {id:1003}</text>

  <!-- Arrows to/from primary -->
  <line x1="260" y1="200" x2="320" y2="200" stroke="#0891b2" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="290" y="192" font-family="monospace" font-size="10" fill="#67e8f9" text-anchor="middle">WAL</text>

  <!-- Downstream subscribers (right) -->
  <rect x="940" y="100" width="200" height="110" rx="12" fill="#0a1a10" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1040" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4ade80" text-anchor="middle">Subscriber A</text>
  <text x="960" y="150" font-family="monospace" font-size="11" fill="#6b7280">Debezium CDC</text>
  <text x="960" y="170" font-family="monospace" font-size="11" fill="#6b7280">→ Kafka topic</text>
  <text x="960" y="190" font-family="monospace" font-size="11" fill="#4ade80">● connected</text>

  <rect x="940" y="230" width="200" height="110" rx="12" fill="#0a1628" stroke="#2f74ff" stroke-width="1.5"/>
  <text x="1040" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#93c5fd" text-anchor="middle">Subscriber B</text>
  <text x="960" y="280" font-family="monospace" font-size="11" fill="#6b7280">Replica DB</text>
  <text x="960" y="300" font-family="monospace" font-size="11" fill="#6b7280">standby sync</text>
  <text x="960" y="320" font-family="monospace" font-size="11" fill="#4ade80">● in-sync</text>

  <line x1="880" y1="200" x2="940" y2="155" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="880" y1="280" x2="940" y2="285" stroke="#2f74ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Category chip -->
  <rect x="44" y="44" width="110" height="32" rx="16" fill="#0891b2" fill-opacity="0.25" stroke="#0891b2" stroke-opacity="0.5" stroke-width="1"/>
  <text x="99" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#67e8f9" text-anchor="middle" letter-spacing="1">IVORYSQL</text>

  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1e28" stop-opacity="0"/>
      <stop offset="100%" stop-color="#030d12" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="460" width="1200" height="170" fill="url(#btm)"/>
  <text x="600" y="514" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">Logical Replication Slot</text>
  <text x="600" y="556" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#67e8f9" text-anchor="middle" fill-opacity="0.8">Slot synchronization analysis in IvorySQL v4</text>
  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
