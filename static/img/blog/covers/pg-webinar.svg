<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#2d0a14"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="230" r="310" fill="#dc2626" fill-opacity="0.04"/>

  <!-- Left: SQL code block -->
  <rect x="60" y="80" width="520" height="320" rx="14" fill="#0d0303" stroke="#dc2626" stroke-width="1.5" stroke-opacity="0.7"/>
  <rect x="60" y="80" width="520" height="36" rx="14" fill="#1c0505"/>
  <rect x="60" y="102" width="520" height="14" fill="#1c0505"/>
  <!-- window dots -->
  <circle cx="88" cy="98" r="6" fill="#ef4444"/><circle cx="108" cy="98" r="6" fill="#f59e0b"/><circle cx="128" cy="98" r="6" fill="#22c55e"/>
  <text x="340" y="103" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">psql — IvorySQL demo</text>

  <!-- SQL content -->
  <text x="90" y="138" font-family="monospace" font-size="12" fill="#f87171">-- Oracle-compatible query</text>
  <text x="90" y="158" font-family="monospace" font-size="12" fill="#fca5a5">SELECT</text>
  <text x="150" y="158" font-family="monospace" font-size="12" fill="#e2e8f0">  emp_name, salary,</text>
  <text x="90" y="178" font-family="monospace" font-size="12" fill="#e2e8f0">       ROWNUM AS row_num</text>
  <text x="90" y="198" font-family="monospace" font-size="12" fill="#fca5a5">FROM</text>
  <text x="134" y="198" font-family="monospace" font-size="12" fill="#e2e8f0">   employees</text>
  <text x="90" y="218" font-family="monospace" font-size="12" fill="#fca5a5">WHERE</text>
  <text x="144" y="218" font-family="monospace" font-size="12" fill="#e2e8f0">  ROWNUM &lt;= 10</text>
  <text x="90" y="238" font-family="monospace" font-size="12" fill="#fca5a5">ORDER BY</text>
  <text x="174" y="238" font-family="monospace" font-size="12" fill="#e2e8f0"> salary DESC;</text>
  <line x1="90" y1="252" x2="550" y2="252" stroke="#374151" stroke-width="1"/>
  <text x="90" y="272" font-family="monospace" font-size="12" fill="#6b7280"> emp_name  | salary  | row_num</text>
  <text x="90" y="290" font-family="monospace" font-size="12" fill="#6b7280">-----------+---------+---------</text>
  <text x="90" y="308" font-family="monospace" font-size="12" fill="#4ade80"> Alice     |  98000  |   1</text>
  <text x="90" y="326" font-family="monospace" font-size="12" fill="#4ade80"> Bob       |  92000  |   2</text>
  <text x="90" y="344" font-family="monospace" font-size="12" fill="#4ade80"> Carol     |  87500  |   3</text>
  <text x="90" y="370" font-family="monospace" font-size="12" fill="#fbbf24">(10 rows)  — Oracle syntax, runs natively</text>

  <!-- Right: Microphone + webinar visual -->
  <g transform="translate(800, 130)">
    <!-- Mic stand -->
    <rect x="-2" y="80" width="4" height="100" fill="#4b5563"/>
    <rect x="-30" y="175" width="60" height="5" rx="3" fill="#374151"/>
    <!-- Mic body -->
    <rect x="-20" y="0" width="40" height="80" rx="20" fill="#1f2937" stroke="#dc2626" stroke-width="2"/>
    <!-- Mic grille lines -->
    <line x1="-16" y1="25" x2="16" y2="25" stroke="#374151" stroke-width="1.5"/>
    <line x1="-18" y1="38" x2="18" y2="38" stroke="#374151" stroke-width="1.5"/>
    <line x1="-18" y1="51" x2="18" y2="51" stroke="#374151" stroke-width="1.5"/>
    <line x1="-16" y1="64" x2="16" y2="64" stroke="#374151" stroke-width="1.5"/>
    <!-- Sound waves -->
    <path d="M 35,40 Q 55,40 55,40" stroke="#dc2626" stroke-width="2" fill="none" stroke-opacity="0.8"/>
    <path d="M 38,28 Q 65,28 65,40 Q 65,52 38,52" stroke="#dc2626" stroke-width="1.8" fill="none" stroke-opacity="0.6"/>
    <path d="M 40,16 Q 78,16 78,40 Q 78,64 40,64" stroke="#f87171" stroke-width="1.5" fill="none" stroke-opacity="0.4"/>
    <path d="M-35,40 Q-55,40-55,40" stroke="#dc2626" stroke-width="2" fill="none" stroke-opacity="0.8"/>
    <path d="M-38,28 Q-65,28-65,40 Q-65,52-38,52" stroke="#dc2626" stroke-width="1.8" fill="none" stroke-opacity="0.6"/>
    <path d="M-40,16 Q-78,16-78,40 Q-78,64-40,64" stroke="#f87171" stroke-width="1.5" fill="none" stroke-opacity="0.4"/>
    <!-- Live dot -->
    <circle cx="0" cy="-24" r="8" fill="#dc2626"/>
    <text x="0" y="-20" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">LIVE</text>
  </g>

  <!-- Webinar info chips -->
  <rect x="700" y="310" width="180" height="48" rx="10" fill="#1c0505" stroke="#dc2626" stroke-width="1.5"/>
  <text x="790" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#f87171" text-anchor="middle">PostgresWorld</text>
  <text x="790" y="350" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle">Global Webinar</text>

  <rect x="920" y="310" width="200" height="48" rx="10" fill="#1c0505" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1020" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="middle">400+ Attendees</text>
  <text x="1020" y="350" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle">March 2022</text>

  <!-- Category chip -->
  <rect x="44" y="44" width="110" height="32" rx="16" fill="#dc2626" fill-opacity="0.2" stroke="#dc2626" stroke-opacity="0.5" stroke-width="1"/>
  <text x="99" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fca5a5" text-anchor="middle" letter-spacing="1">IVORYSQL</text>

  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d0a14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0206" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="440" width="1200" height="190" fill="url(#btm)"/>
  <text x="600" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle">PostgresWorld Webinar</text>
  <text x="600" y="538" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#fca5a5" text-anchor="middle" fill-opacity="0.85">IvorySQL live demo — Oracle SQL compatibility showcase</text>
  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
