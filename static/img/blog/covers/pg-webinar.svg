<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2545"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1a33"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Background grid lines -->
  <g stroke="#1e3a6e" stroke-width="1" stroke-opacity="0.4">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left: SQL code block -->
  <rect x="60" y="80" width="460" height="310" rx="10" fill="#0d1117" stroke="#1e40af" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Code block title bar -->
  <rect x="60" y="80" width="460" height="36" rx="10" fill="#161b27"/>
  <rect x="60" y="104" width="460" height="12" fill="#161b27"/>
  <circle cx="85" cy="98" r="6" fill="#ff5f57"/>
  <circle cx="105" cy="98" r="6" fill="#ffbd2e"/>
  <circle cx="125" cy="98" r="6" fill="#28c840"/>
  <text x="260" y="103" font-family="monospace" font-size="12" fill="#4b5563" text-anchor="middle">IvorySQL Demo</text>

  <!-- SQL code lines -->
  <text x="80" y="142" font-family="monospace" font-size="14" fill="#6b7280">-- PostgresWorld Webinar</text>
  <text x="80" y="168" font-family="monospace" font-size="14">
    <tspan fill="#c792ea">SELECT</tspan>
    <tspan fill="#e2e8f0"> feature, status</tspan>
  </text>
  <text x="80" y="194" font-family="monospace" font-size="14">
    <tspan fill="#c792ea">FROM</tspan>
    <tspan fill="#82aaff"> ivorysql.features</tspan>
  </text>
  <text x="80" y="220" font-family="monospace" font-size="14">
    <tspan fill="#c792ea">WHERE</tspan>
    <tspan fill="#e2e8f0"> category = </tspan>
    <tspan fill="#c3e88d">'oracle_compat'</tspan>
  </text>
  <text x="80" y="246" font-family="monospace" font-size="14">
    <tspan fill="#c792ea">ORDER BY</tspan>
    <tspan fill="#e2e8f0"> release_date </tspan>
    <tspan fill="#c792ea">DESC</tspan>
    <tspan fill="#e2e8f0">;</tspan>
  </text>

  <!-- Query result table -->
  <rect x="80" y="264" width="420" height="30" rx="4" fill="#1e3a8a" fill-opacity="0.6"/>
  <text x="95" y="283" font-family="monospace" font-size="12" fill="#93c5fd">feature</text>
  <text x="250" y="283" font-family="monospace" font-size="12" fill="#93c5fd">status</text>
  <line x1="80" y1="294" x2="500" y2="294" stroke="#1e3a8a" stroke-width="1"/>
  <text x="95" y="314" font-family="monospace" font-size="12" fill="#e2e8f0">ROWNUM</text>
  <text x="250" y="314" font-family="monospace" font-size="12" fill="#4ade80">✓ active</text>
  <text x="95" y="334" font-family="monospace" font-size="12" fill="#e2e8f0">PL/iSQL</text>
  <text x="250" y="334" font-family="monospace" font-size="12" fill="#4ade80">✓ active</text>
  <text x="95" y="354" font-family="monospace" font-size="12" fill="#e2e8f0">SYSDATE</text>
  <text x="250" y="354" font-family="monospace" font-size="12" fill="#4ade80">✓ active</text>
  <text x="80" y="378" font-family="monospace" font-size="12" fill="#6b7280">3 rows returned in 0.4ms</text>

  <!-- Right: Microphone + wave rings -->
  <circle cx="850" cy="230" r="120" fill="#0e1f3d" stroke="#2f74ff" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="850" cy="230" r="90"  fill="none" stroke="#2f74ff" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="850" cy="230" r="60"  fill="none" stroke="#2f74ff" stroke-width="1" stroke-opacity="0.35"/>
  <!-- Sound waves -->
  <path d="M 750 180 Q 710 230 750 280" fill="none" stroke="#2f74ff" stroke-width="2.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M 730 155 Q 680 230 730 305" fill="none" stroke="#2f74ff" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
  <path d="M 950 180 Q 990 230 950 280" fill="none" stroke="#2f74ff" stroke-width="2.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M 970 155 Q 1020 230 970 305" fill="none" stroke="#2f74ff" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Mic body -->
  <rect x="826" y="175" width="48" height="72" rx="24" fill="#2f74ff"/>
  <!-- Mic stand -->
  <line x1="850" y1="247" x2="850" y2="290" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
  <line x1="825" y1="290" x2="875" y2="290" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
  <!-- Mic grille -->
  <line x1="836" y1="195" x2="864" y2="195" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="836" y1="207" x2="864" y2="207" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="836" y1="219" x2="864" y2="219" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="836" y1="231" x2="864" y2="231" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- PostgresWorld badge -->
  <rect x="680" y="360" width="340" height="56" rx="12" fill="#1e3a8a" fill-opacity="0.7" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="850" y="382" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="2">LIVE WEBINAR</text>
  <text x="850" y="403" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">PostgresWorld 2022</text>

  <!-- Category chip -->
  <rect x="44" y="44" width="130" height="32" rx="16" fill="#0891b2" fill-opacity="0.25" stroke="#0891b2" stroke-opacity="0.5" stroke-width="1"/>
  <text x="109" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#67e8f9" text-anchor="middle" letter-spacing="1">POSTGRESQL</text>

  <!-- Bottom -->
  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2545" stop-opacity="0"/>
      <stop offset="100%" stop-color="#060c1a" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect x="0" y="400" width="1200" height="230" fill="url(#btm)"/>

  <text x="600" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="40" font-weight="800" fill="#ffffff" text-anchor="middle">PostgresWorld Webinar</text>
  <text x="600" y="538" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="400" fill="#93c5fd" text-anchor="middle" fill-opacity="0.8">A Deep Dive Into IvorySQL</text>
  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
