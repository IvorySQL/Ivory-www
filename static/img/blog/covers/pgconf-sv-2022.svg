<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f0fe"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stage area -->
  <rect x="80" y="80" width="1040" height="270" rx="16" fill="url(#stage)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Projector screen -->
  <rect x="190" y="100" width="520" height="230" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <!-- Screen: slide content -->
  <rect x="202" y="112" width="496" height="44" rx="4" fill="#dbeafe"/>
  <text x="450" y="141" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#1d4ed8" text-anchor="middle">PostgresConf SV 2022</text>
  <!-- IvorySQL logo area on slide -->
  <rect x="310" y="166" width="280" height="90" rx="8" fill="#eff6ff"/>
  <text x="450" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="900" fill="#1e40af" text-anchor="middle">IvorySQL</text>
  <text x="450" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle">Oracle-compatible PostgreSQL</text>
  <text x="450" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Open Source  ·  Enterprise Grade</text>
  <!-- Slide footer -->
  <text x="450" y="318" font-family="monospace" font-size="11" fill="#93c5fd" text-anchor="middle">github.com/IvorySQL/IvorySQL</text>

  <!-- Presenter -->
  <ellipse cx="140" cy="256" rx="20" ry="20" fill="#1e3a8a"/>
  <rect x="120" y="276" width="40" height="48" rx="8" fill="#1e3a8a"/>
  <!-- Mic -->
  <line x1="140" y1="276" x2="140" y2="310" stroke="#60a5fa" stroke-width="2.5"/>
  <rect x="130" y="246" width="20" height="26" rx="10" fill="#3b82f6"/>

  <!-- Spotlight beams from top corners -->
  <polygon points="200,80 280,80 250,350 170,350" fill="#fbbf24" fill-opacity="0.06"/>
  <polygon points="640,80 720,80 690,350 610,350" fill="#fbbf24" fill-opacity="0.04"/>

  <!-- Event cards (right of stage) -->
  <rect x="820" y="88" width="270" height="72" rx="10" fill="#1e40af" stroke="#93c5fd" stroke-width="1"/>
  <text x="955" y="114" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Location</text>
  <text x="955" y="136" font-family="monospace" font-size="12" fill="#bfdbfe" text-anchor="middle">Silicon Valley, CA</text>
  <text x="955" y="153" font-family="monospace" font-size="11" fill="#93c5fd" text-anchor="middle">April 2022</text>

  <rect x="820" y="172" width="270" height="72" rx="10" fill="#1d4ed8" stroke="#93c5fd" stroke-width="1"/>
  <text x="955" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Track</text>
  <text x="955" y="218" font-family="monospace" font-size="12" fill="#bfdbfe" text-anchor="middle">Oracle Migration</text>
  <text x="955" y="236" font-family="monospace" font-size="11" fill="#93c5fd" text-anchor="middle">Compatibility &amp; Features</text>

  <rect x="820" y="256" width="270" height="60" rx="10" fill="#15803d" stroke="#86efac" stroke-width="1"/>
  <text x="955" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Community</text>
  <text x="955" y="300" font-family="monospace" font-size="11" fill="#bbf7d0" text-anchor="middle">Global PostgreSQL event</text>

  <!-- Audience rows (light silhouettes on dark stage) -->
  <g fill="#1e3a8a" fill-opacity="0.6">
    <ellipse cx="200" cy="338" rx="13" ry="13"/><ellipse cx="240" cy="338" rx="13" ry="13"/>
    <ellipse cx="280" cy="338" rx="13" ry="13"/><ellipse cx="320" cy="338" rx="13" ry="13"/>
    <ellipse cx="360" cy="338" rx="13" ry="13"/><ellipse cx="400" cy="338" rx="13" ry="13"/>
    <ellipse cx="440" cy="338" rx="13" ry="13"/><ellipse cx="480" cy="338" rx="13" ry="13"/>
    <ellipse cx="520" cy="338" rx="13" ry="13"/><ellipse cx="560" cy="338" rx="13" ry="13"/>
    <ellipse cx="600" cy="338" rx="13" ry="13"/><ellipse cx="640" cy="338" rx="13" ry="13"/>
    <ellipse cx="680" cy="338" rx="13" ry="13"/><ellipse cx="720" cy="338" rx="13" ry="13"/>
  </g>
  <g fill="#1e40af" fill-opacity="0.4">
    <ellipse cx="220" cy="318" rx="11" ry="11"/><ellipse cx="260" cy="318" rx="11" ry="11"/>
    <ellipse cx="300" cy="318" rx="11" ry="11"/><ellipse cx="340" cy="318" rx="11" ry="11"/>
    <ellipse cx="380" cy="318" rx="11" ry="11"/><ellipse cx="420" cy="318" rx="11" ry="11"/>
    <ellipse cx="460" cy="318" rx="11" ry="11"/><ellipse cx="500" cy="318" rx="11" ry="11"/>
    <ellipse cx="540" cy="318" rx="11" ry="11"/><ellipse cx="580" cy="318" rx="11" ry="11"/>
    <ellipse cx="620" cy="318" rx="11" ry="11"/><ellipse cx="660" cy="318" rx="11" ry="11"/>
    <ellipse cx="700" cy="318" rx="11" ry="11"/>
  </g>

  <!-- Category chip -->
  <rect x="44" y="44" width="130" height="32" rx="16" fill="#1d4ed8" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.5" stroke-width="1"/>
  <text x="109" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#1e40af" text-anchor="middle" letter-spacing="1">POSTGRESQL</text>

  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0"/>
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect x="0" y="400" width="1200" height="230" fill="url(#btm)"/>
  <text x="600" y="466" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#1e3a8a" text-anchor="middle">IvorySQL at PostgresConf SV 2022</text>
  <text x="600" y="510" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#1d4ed8" text-anchor="middle">Debut on the global PostgreSQL community stage</text>
  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
