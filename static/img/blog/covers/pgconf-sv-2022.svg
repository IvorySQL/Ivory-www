<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0c2461"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stage / presentation area -->
  <rect x="80" y="80" width="1040" height="280" rx="16" fill="url(#stage)" stroke="#2f74ff" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Projector screen on stage -->
  <rect x="180" y="100" width="540" height="240" rx="8" fill="#03071e" stroke="#4a80ff" stroke-width="2"/>
  <!-- Screen content: PostgresConf SV 2022 slide -->
  <rect x="192" y="112" width="516" height="50" rx="4" fill="#0d2060"/>
  <text x="450" y="144" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">PostgresConf SV 2022</text>
  <text x="450" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#fbaf42" text-anchor="middle">IvorySQL</text>
  <text x="450" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">Oracle-compatible PostgreSQL</text>
  <text x="450" y="236" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Open Source · Enterprise Grade</text>
  <!-- Elephant logo sketch -->
  <ellipse cx="450" cy="278" rx="25" ry="22" fill="#2f74ff" fill-opacity="0.2" stroke="#2f74ff" stroke-width="1.5"/>
  <text x="450" y="284" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#4a80ff" text-anchor="middle">🐘</text>

  <!-- Presenter silhouette -->
  <ellipse cx="130" cy="260" rx="22" ry="22" fill="#1e3a8a"/>
  <rect x="108" y="282" width="44" height="50" rx="8" fill="#1e3a8a"/>
  <!-- Microphone stand -->
  <line x1="130" y1="282" x2="130" y2="320" stroke="#374151" stroke-width="3"/>
  <rect x="118" y="245" width="24" height="30" rx="12" fill="#374151"/>

  <!-- Audience rows (silhouettes) -->
  <g fill="#0f2060" opacity="0.8">
    <!-- Row 1 -->
    <ellipse cx="180" cy="345" rx="14" ry="14"/>
    <ellipse cx="220" cy="345" rx="14" ry="14"/>
    <ellipse cx="260" cy="345" rx="14" ry="14"/>
    <ellipse cx="300" cy="345" rx="14" ry="14"/>
    <ellipse cx="340" cy="345" rx="14" ry="14"/>
    <ellipse cx="380" cy="345" rx="14" ry="14"/>
    <ellipse cx="420" cy="345" rx="14" ry="14"/>
    <ellipse cx="460" cy="345" rx="14" ry="14"/>
    <ellipse cx="500" cy="345" rx="14" ry="14"/>
    <ellipse cx="540" cy="345" rx="14" ry="14"/>
    <ellipse cx="580" cy="345" rx="14" ry="14"/>
    <ellipse cx="620" cy="345" rx="14" ry="14"/>
    <ellipse cx="660" cy="345" rx="14" ry="14"/>
    <ellipse cx="700" cy="345" rx="14" ry="14"/>
    <ellipse cx="740" cy="345" rx="14" ry="14"/>
    <!-- Row 2 (back) -->
    <ellipse cx="200" cy="325" rx="12" ry="12"/>
    <ellipse cx="240" cy="325" rx="12" ry="12"/>
    <ellipse cx="280" cy="325" rx="12" ry="12"/>
    <ellipse cx="320" cy="325" rx="12" ry="12"/>
    <ellipse cx="360" cy="325" rx="12" ry="12"/>
    <ellipse cx="400" cy="325" rx="12" ry="12"/>
    <ellipse cx="440" cy="325" rx="12" ry="12"/>
    <ellipse cx="480" cy="325" rx="12" ry="12"/>
    <ellipse cx="520" cy="325" rx="12" ry="12"/>
    <ellipse cx="560" cy="325" rx="12" ry="12"/>
    <ellipse cx="600" cy="325" rx="12" ry="12"/>
    <ellipse cx="640" cy="325" rx="12" ry="12"/>
    <ellipse cx="680" cy="325" rx="12" ry="12"/>
    <ellipse cx="720" cy="325" rx="12" ry="12"/>
  </g>

  <!-- Event info cards on right -->
  <rect x="800" y="90" width="270" height="80" rx="10" fill="#0a1628" stroke="#fbaf42" stroke-width="1.5"/>
  <text x="820" y="116" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fbaf42">📅  Event</text>
  <text x="820" y="138" font-family="monospace" font-size="12" fill="#9ca3af">PostgresConf SV 2022</text>
  <text x="820" y="158" font-family="monospace" font-size="11" fill="#6b7280">Silicon Valley, CA, USA</text>

  <rect x="800" y="184" width="270" height="80" rx="10" fill="#0a1628" stroke="#2f74ff" stroke-width="1.5"/>
  <text x="820" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#93c5fd">🎤  Talk</text>
  <text x="820" y="230" font-family="monospace" font-size="12" fill="#9ca3af">Introducing IvorySQL</text>
  <text x="820" y="250" font-family="monospace" font-size="11" fill="#6b7280">First major appearance</text>

  <rect x="800" y="278" width="270" height="60" rx="10" fill="#0a1628" stroke="#16a34a" stroke-width="1.5"/>
  <text x="820" y="302" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4ade80">🔓  Open Source</text>
  <text x="820" y="322" font-family="monospace" font-size="11" fill="#6b7280">github.com/IvorySQL/IvorySQL</text>

  <!-- Light beam effects from projector -->
  <polygon points="722,100 800,100 780,340 702,340" fill="#2f74ff" fill-opacity="0.03"/>

  <!-- Category chip -->
  <rect x="44" y="44" width="130" height="32" rx="16" fill="#2f74ff" fill-opacity="0.25" stroke="#2f74ff" stroke-opacity="0.5" stroke-width="1"/>
  <text x="109" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#93c5fd" text-anchor="middle" letter-spacing="1">POSTGRESQL</text>

  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b3e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020510" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="440" width="1200" height="190" fill="url(#btm)"/>
  <text x="600" y="495" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">IvorySQL at PostgresConf SV 2022</text>
  <text x="600" y="538" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#93c5fd" text-anchor="middle" fill-opacity="0.85">Debut on the global PostgreSQL community stage</text>
  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
