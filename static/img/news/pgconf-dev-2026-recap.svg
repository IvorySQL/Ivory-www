<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d0528"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7D52F4"/>
      <stop offset="100%" stop-color="#2f74ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Vancouver skyline silhouette -->
  <path d="M 60 400 L 120 280 L 140 280 L 180 340 L 220 260 L 250 260 L 290 320 L 320 220 L 350 220 L 380 300 L 420 350 L 460 270 L 490 270 L 530 310 L 570 230 L 600 230 L 640 360 L 680 250 L 710 250 L 740 300 L 780 240 L 810 240 L 840 330 L 880 290 L 910 290 L 940 350 L 980 260 L 1010 260 L 1040 310 L 1080 280 L 1110 280 L 1140 380 L 1140 400 Z" fill="#1a1040" stroke="#7D52F4" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Left: Location pin -->
  <g transform="translate(100, 100)">
    <circle cx="30" cy="20" r="18" fill="#7D52F4" fill-opacity="0.3" stroke="#7D52F4" stroke-width="1.5"/>
    <text x="30" y="26" font-family="sans-serif" font-size="16" fill="#c4b5fd" text-anchor="middle">📍</text>
    <text x="60" y="26" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#a78bfa" font-weight="700">VANCOUVER</text>
  </g>

  <!-- Center: conference badge -->
  <rect x="400" y="120" width="400" height="280" rx="20" fill="#1a1040" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.6"/>
  <rect x="420" y="150" width="360" height="4" rx="2" fill="#7D52F4" fill-opacity="0.5"/>
  <text x="600" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="#c4b5fd" text-anchor="middle">P G C o n f . d e v</text>
  <rect x="480" y="220" width="240" height="2" rx="1" fill="#7D52F4" fill-opacity="0.4"/>
  <text x="600" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="800" fill="#ffffff" text-anchor="middle">2026</text>

  <!-- Stats row -->
  <g transform="translate(600, 300)">
    <text x="-120" y="0" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="800" fill="#7D52F4" text-anchor="middle">259</text>
    <text x="-120" y="20" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Attendees</text>

    <text x="0" y="0" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="800" fill="#7D52F4" text-anchor="middle">89</text>
    <text x="0" y="20" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Sessions</text>

    <text x="120" y="0" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="800" fill="#7D52F4" text-anchor="middle">30</text>
    <text x="120" y="20" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Years</text>
  </g>

  <!-- Bottom area -->
  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="460" width="1200" height="170" fill="url(#btm)"/>
  <text x="600" y="498" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle">PGConf.dev 2026 Recap</text>
  <text x="600" y="535" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#93c5fd" text-anchor="middle" fill-opacity="0.8">Vancouver · PostgreSQL 30th Anniversary · HighGo & IvorySQL</text>

  <!-- Category chip -->
  <rect x="44" y="520" width="110" height="32" rx="16" fill="#7D52F4" fill-opacity="0.25" stroke="#7D52F4" stroke-width="1" stroke-opacity="0.5"/>
  <text x="99" y="541" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="1">COMMUNITY</text>

  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
